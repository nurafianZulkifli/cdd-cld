<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transit Station Display</title>
    <script src="https://kit.fontawesome.com/965e82ac01.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="assets/css/transit-ui.css">
</head>
<body>
    <div class="container">
        <!-- Main Display -->
        <main class="display-panel">

            <!-- Video Display -->
            <div class="video-container">
                <img class="station-video" src="assets/DC-CDD_Blank.png" alt="Station Display Blank">
                <video class="station-video-temp" style="display: none;">
                    <source src="video/DC-CDD.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <audio id="doorsAudio" style="display: none;">
                    <source src="announcements/dc-ann.wav" type="audio/wav">
                </audio>
            </div>

            <!-- Station Display -->
            <div class="station-display">
                <video class="station-video-cld">
                    <source src="video/DC-CLD.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </main>

        <!-- Control Buttons -->
        <footer class="control-panel">
            <button class="control-button doors-btn" data-action="doors">
                <span class="btn-icon"><i class="fa-solid fa-arrow-right-from-bracket"></i></span>
                <span class="btn-text">Doors Closing</span>
            </button>
            <button class="control-button current-btn" data-action="prev">
                <span class="btn-icon"><i class="fa-solid fa-location-dot"></i></span>
                <span class="btn-text">Current Station</span>
            </button>
            <button class="control-button next-btn" data-action="next">
                <span class="btn-icon"><i class="fa-solid fa-angles-right"></i></span>
                <span class="btn-text">Next Station</span>
            </button>
            <button class="control-button messages-btn" data-action="messages">
                <span class="btn-icon"><i class="fa-solid fa-message"></i></span>
                <span class="btn-text">Messages</span>
            </button>
        </footer>

        <!-- Modal for Messages -->
        <div id="messagesModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Messages</h2>
                    <button class="modal-close">✕</button>
                </div>
                <div class="modal-body">
                    <div class="message-categories">
                        <button class="category-btn active" data-category="alert">🚨 Alerts</button>
                        <button class="category-btn" data-category="safety">⚠️ Safety</button>
                        <button class="category-btn" data-category="service">🔧 Service</button>
                        <button class="category-btn" data-category="info">ℹ️ Info</button>
                    </div>
                    <div class="messages-list" id="messagesList">
                        <!-- Messages will be populated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal for Stations -->
        <div id="stationsModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Select Station</h2>
                    <button class="modal-close">✕</button>
                </div>
                <div class="modal-body">
                    <div class="stations-list" id="stationsList">
                        <!-- Stations will be populated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Toast -->
        <div id="statusToast" class="status-toast hidden"></div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
