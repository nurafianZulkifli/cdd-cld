<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SMRT CDD-CLD | Works by NRFZ</title>
    
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    
    <!-- Critical CSS - loaded with high priority -->
    <link rel="preload" as="style" href="assets/css/transit-ui_nsl.css">
    <link rel="stylesheet" href="assets/css/transit-ui_nsl.css">
    
    <script src="https://kit.fontawesome.com/965e82ac01.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <!-- Main Display -->
        <main class="display-panel">

            <!-- Video Display -->
            <div class="video-container">
                <video class="station-video-temp" style="display: none;" muted playsinline>
                    <source src="video/toMSP/DC-CDD.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <audio id="doorsAudio" style="display: none;">
                    <source src="announcements/dc-ann.wav" type="audio/wav">
                </audio>
            </div>

            <!-- Station Display -->
            <div class="station-display">
                <video class="station-video-cld" muted playsinline>
                    <source src="video/toMSP/DC-CLD.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </main>

        <!-- Control Buttons -->
        <footer class="control-panel">
            <button class="control-button messages-btn" data-action="messages">
                <span class="btn-icon"><i class="fa-solid fa-message"></i></span>
                <span class="btn-text">Messages</span>
            </button>
            <button class="control-button line-btn" data-action="line">
                <span class="btn-icon"><i class="fa-solid fa-location-dot"></i></span>
                <span class="btn-text">Stations</span>
            </button>
                <button class="control-button station-btn" data-action="station">
                    <span class="btn-icon"><i class="fa-kit fa-lta-train"></i></span>
                    <span class="btn-text">Lines</span>
                </button>
        </footer>

        <!-- Modal for Messages -->
        <div id="messagesModal" class="modal hidden">
            <div class="modal-content msg">
                <div class="modal-header">
                    <h2>Messages</h2>
                    <button class="modal-close">✕</button>
                </div>
                <div class="modal-body">
                    <div class="message-categories">
                        <button class="category-btn active" data-category="alert">⚠️ Warning</button>
                        <button class="category-btn" data-category="safety">⚠️ Safety</button>
                        <!-- <button class="category-btn" data-category="service">🔧 Service</button> -->
                        <button class="category-btn" data-category="info">ℹ️ Info</button>
                    </div>
                    <div class="messages-list" id="messagesList">
                        <!-- Messages will be populated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal for Stations -->
        <div id="linesModal" class="modal hidden">
            <div class="modal-content stn">
                <div class="modal-header">
                    <h2>Select Stations</h2>
                    <button class="modal-close">✕</button>
                </div>
                <div class="line-tabs">
                    <button class="line-tab-btn active" data-tab="current">Current Station</button>
                    <button class="line-tab-btn" data-tab="next">Next Station</button>
                    <button class="line-tab-btn" data-tab="doors-closing">Doors Closing</button>
                </div>
                <div class="modal-body">
                    <div class="line-categories">
                        <!-- Station category buttons will be populated here -->
                    </div>
                    <div class="lines-list" id="linesList">
                        <!-- Stations will be populated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal for MRT Lines -->
        <div id="transitLinesModal" class="modal hidden">
            <div class="modal-content ln">
                <div class="modal-header">
                    <h2>Select MRT Line</h2>
                    <button class="modal-close">✕</button>
                </div>
                <div class="modal-body">
                    <div class="transit-lines-list" id="transitLinesList">
                        <!-- MRT lines will be populated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Toast -->
        <div id="statusToast" class="status-toast hidden"></div>
    </div>

    <!-- Scripts loaded with defer for non-blocking rendering -->
    <script defer src="assets/js/lines.js"></script>
    <script defer src="assets/js/main.js"></script>
</body>
</html>
